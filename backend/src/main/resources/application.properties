# ── Server ──
server.port=8080
server.servlet.context-path=

# ── H2 Database (file-based so data survives within the running container) ──
# IMPORTANT: Free-tier Render instances have ephemeral disks — data is lost
# on a full restart/sleep-wake cycle. For true persistence, replace H2 with
# a managed Postgres instance (e.g. Render Postgres or Supabase) and update
# the datasource URL, driver, and JPA dialect accordingly.
spring.datasource.url=jdbc:h2:file:/tmp/spedex_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# ── Jackson: snake_case to match frontend contract ──
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# ── JWT ──
spedex.jwt.secret=${JWT_SECRET:default_secret_that_is_at_least_256_bits_long_for_dev_only}
spedex.jwt.expiration-ms=86400000

# ── CORS ──
spedex.cors.allowed-origins=http://localhost:5173,http://localhost:3000,https://spedex.vercel.app,https://spe-dex.vercel.app
